{% extends "todo/base.html" %}
{% block content %}
<h2>{% if form.instance.pk %}Edit Task{% else %}Add Task{% endif %}</h2>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_title" class="form-label" name="title">Title</label>
        <input type="text" class="form-control" id="id_title" name="title" value="{{ task.title }}">
        <div class="mb-3">
            <label class="form-label" for="id_description">Description</label>
            <textarea class="form-control" id="id_description" name="description" rows="4">{{ task.description }}</textarea>
            <button type="submit" class="btn btn-primary">Save Task</button>
            <a href="{% url 'todo:task_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
{% endblock %}
