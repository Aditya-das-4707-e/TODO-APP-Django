name: CI Build Image & Update Manifest

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set image tag from Git commit
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ env.IMAGE_TAG }}

      - name: Find Kubernetes deployment manifest
        run: |
          DEPLOY_FILE=$(find . -name "deployment.y*ml" | head -n 1)
          echo "DEPLOY_FILE=$DEPLOY_FILE" >> $GITHUB_ENV

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*/todo-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/todo-app:${IMAGE_TAG}|" $DEPLOY_FILE

      - name: Commit & push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add $DEPLOY_FILE

          git diff --cached --quiet || git commit -m "Deploy todo-app image ${IMAGE_TAG}"

          git push